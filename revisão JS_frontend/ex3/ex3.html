<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formatador de Nomes</title>
</head>
<body>

    <div class="container">
        <h1>Formatador de Nomes para Agenda</h1>
        
        <form id="formNome">
            <label for="nome">Digite o nome do contato:</label>
            <input type="text" id="nome" placeholder="Ex:  joão   silva  " autofocus>
            <button type="submit">Formatar Nome</button>
        </form>

        <div id="resultado" aria-live="polite"></div>
    </div>
    <script src="ex3.js"></script>
</body>
</html>
